apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: cmp-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: cmp-gateway
                port:
                  number: 3000
