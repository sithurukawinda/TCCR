# Template — copy to k8s/<service-name>/deployment.yaml and fill in SERVICE_NAME and PORT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmp-SERVICE_NAME
  labels:
    app: cmp-SERVICE_NAME
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmp-SERVICE_NAME
  template:
    metadata:
      labels:
        app: cmp-SERVICE_NAME
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: SERVICE_NAME
          image: REGISTRY/cmp-SERVICE_NAME:latest
          ports:
            - containerPort: PORT
          envFrom:
            - secretRef:
                name: cmp-secrets
          env:
            - name: SERVICE_NAME
              value: SERVICE_NAME
            - name: PORT
              value: "PORT"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /healthz
              port: PORT
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: PORT
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi
