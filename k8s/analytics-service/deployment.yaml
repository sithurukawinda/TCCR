apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmp-analytics-service
  labels:
    app: cmp-analytics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmp-analytics-service
  template:
    metadata:
      labels:
        app: cmp-analytics-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: analytics-service
          image: REGISTRY/cmp-analytics-service:latest
          ports:
            - containerPort: 3011
          envFrom:
            - secretRef:
                name: cmp-secrets
          env:
            - name: SERVICE_NAME
              value: analytics-service
            - name: PORT
              value: "3011"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3011
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi
