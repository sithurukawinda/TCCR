# Template — copy to k8s/<service-name>/deployment.yaml and fill in auth-service and 3001
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmp-auth-service
  labels:
    app: cmp-auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmp-auth-service
  template:
    metadata:
      labels:
        app: cmp-auth-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: REGISTRY/cmp-auth-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: cmp-secrets
          env:
            - name: auth-service
              value: auth-service
            - name: 3001
              value: "3001"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi
