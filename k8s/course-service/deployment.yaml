# Template — copy to k8s/<service-name>/deployment.yaml and fill in course-service and 3003
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmp-course-service
  labels:
    app: cmp-course-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmp-course-service
  template:
    metadata:
      labels:
        app: cmp-course-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: course-service
          image: REGISTRY/cmp-course-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: cmp-secrets
          env:
            - name: course-service
              value: course-service
            - name: 3003
              value: "3003"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi
