# Compose override for local emulator testing.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Prerequisites:
#   1. npx firebase emulators:start
#   2. node scripts/seed-emulator.js
#   3. (then run the compose command above)

x-emulator-env: &emulator-env
  FIRESTORE_EMULATOR_HOST: host.docker.internal:8080
  FIREBASE_AUTH_EMULATOR_HOST: host.docker.internal:9099
  FIREBASE_STORAGE_EMULATOR_HOST: host.docker.internal:9199
  # Override project ID to match the emulator's configured project (demo-cmp).
  # The Auth emulator always issues tokens with aud/iss=demo-cmp regardless of
  # --project flag, so all services must use the same project to verify tokens.
  FIREBASE_PROJECT_ID: demo-cmp

# host.docker.internal is built-in on Docker Desktop (Windows/Mac).
# On Linux it must be mapped to the host gateway — this entry is a no-op on Windows/Mac.
x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

services:
  gateway:
    environment:
      <<: *emulator-env
      RATE_LIMIT_MAX: 2000
      AUTH_RATE_LIMIT_MAX: 100
    extra_hosts: *extra-hosts

  auth-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  user-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  course-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  enrollment-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  progress-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  storage-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  notification-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  audit-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  cell-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  analytics-service:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  scheduled-jobs:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  outbox-worker:
    environment:
      <<: *emulator-env
    extra_hosts: *extra-hosts

  # ── MailHog — local email server (no external service needed) ─────────────
  # All outgoing emails are captured here — view at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP port — services send emails here
      - "8025:8025"   # Web UI  — view all emails in browser
